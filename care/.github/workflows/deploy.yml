name: Deploy Replanta Care

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: PHP Lint Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Lint all PHP files
        run: |
          ERRORS=0
          while IFS= read -r file; do
            if ! php -l "$file" > /dev/null 2>&1; then
              php -l "$file"
              ERRORS=$((ERRORS + 1))
            fi
          done < <(find . -name "*.php" -not -path "./.git/*" -not -path "./vendor/*")

          if [ "$ERRORS" -gt 0 ]; then
            echo "FAILED: $ERRORS PHP file(s) have syntax errors. Fix before releasing."
            exit 1
          fi

          echo "All PHP files passed lint check."

  deploy:
    name: Release & Notify Hub
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: meta
        run: |
          VERSION=$(grep "^define('RPCARE_VERSION'" replanta-care.php | sed "s/.*'\([0-9.]*\)'.*/\1/")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing v$VERSION"

      - name: Build plugin zip
        run: |
          VERSION=${{ steps.meta.outputs.version }}
          mkdir -p /tmp/build/replanta-care

          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='*.md' \
            --exclude='docs/' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            --exclude='config-sample.php' \
            --exclude='update-info.json' \
            ./ /tmp/build/replanta-care/

          cd /tmp/build
          zip -r "$GITHUB_WORKSPACE/replanta-care-${VERSION}.zip" replanta-care/
          echo "Built replanta-care-${VERSION}.zip"

      - name: Create or update GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.meta.outputs.version }}
          name: Replanta Care v${{ steps.meta.outputs.version }}
          files: replanta-care-${{ steps.meta.outputs.version }}.zip
          make_latest: true
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Hub to cache zip and refresh care-info.json
        env:
          HUB_DEPLOY_TOKEN: ${{ secrets.HUB_DEPLOY_TOKEN }}
        run: |
          VERSION=${{ steps.meta.outputs.version }}

          if [ -z "$HUB_DEPLOY_TOKEN" ]; then
            echo "ERROR: HUB_DEPLOY_TOKEN secret not configured"
            exit 1
          fi

          RESPONSE=$(curl -s -o /tmp/hub_response.json -w "%{http_code}" \
            -X POST "https://replanta.net/wp-json/replanta-hub/v1/deploy/care?version=${VERSION}" \
            -H "X-Deploy-Token: ${HUB_DEPLOY_TOKEN}" \
            --max-time 30 --retry 3 --retry-delay 5)

          echo "Hub response HTTP $RESPONSE:"
          cat /tmp/hub_response.json

          if [ "$RESPONSE" != "200" ]; then
            echo "FAILED: Hub notification returned HTTP $RESPONSE"
            exit 1
          fi

          echo "Care v${VERSION} deployed and available to all clients"
